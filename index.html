<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="c"></canvas>

  <!-- Ambient particles layer -->
  <canvas id="particles"></canvas>

  <!-- UI Overlay -->
  <div id="ui-overlay">
    <div id="glow-orb-1" class="glow-orb"></div>
    <div id="glow-orb-2" class="glow-orb"></div>
    <div id="glow-orb-3" class="glow-orb"></div>

    <div id="top-bar">
      <div class="date-chip">🎉 Today's the Day!</div>
    </div>

    <div id="subtitle-text">
      <span class="subtitle-line">Wishing you the most magical</span>
      <span class="subtitle-line accent">birthday ever ✨</span>
    </div>

    <div id="bottom-controls">
      <button id="btn-restart" class="ctrl-btn" title="Replay">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 .49-3.75"></path>
        </svg>
      </button>
      <button id="btn-confetti" class="ctrl-btn" title="Burst">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
